<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Termlernspiel</title>
  <style>
    :root{--bg:#f7f7ff;--card:#ffffff;--ink:#1f2937;--muted:#64748b;--accent:#4f46e5;}
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:linear-gradient(135deg,#f7f7ff,#eef6ff);color:var(--ink);}
    main{width:min(980px,calc(100% - 28px));margin:0 auto;padding:clamp(24px,5vw,56px) 0;}
    .hero{background:var(--card);border-radius:28px;padding:clamp(22px,4vw,40px);box-shadow:0 18px 45px rgba(30,41,59,.10);border:1px solid rgba(79,70,229,.12)}
    h1{font-size:clamp(1.7rem,4vw,2.6rem);line-height:1.1;margin:0 0 12px}
    p{font-size:clamp(1rem,2.3vw,1.16rem);line-height:1.55;color:var(--muted)}
    .btn,.card{display:inline-flex;align-items:center;justify-content:center;min-height:52px;padding:14px 18px;border-radius:18px;background:var(--accent);color:white;text-decoration:none;font-weight:750;touch-action:manipulation}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(min(260px,100%),1fr));gap:14px;margin-top:22px}
    .card{background:white;color:var(--ink);border:1px solid rgba(79,70,229,.18);box-shadow:0 10px 25px rgba(30,41,59,.08);justify-content:flex-start}
  </style>
</head>
<body><main><section class="hero"><h1>Termlernspiel</h1><p>Du wirst gleich zum passenden Übungs-Lernpfad weitergeleitet.</p><p><a class="btn" href="lernpfad-terme-vereinfachen.html">Zum Lernpfad wechseln</a></p><script>setTimeout(function(){ window.location.href = "lernpfad-terme-vereinfachen.html"; }, 900);</script></section></main></body></html>
