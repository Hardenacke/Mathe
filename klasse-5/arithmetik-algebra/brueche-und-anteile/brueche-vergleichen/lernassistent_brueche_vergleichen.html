<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#4f46e5" />
  <title>Lernassistent – Brüche vergleichen</title>
  <style>
    :root{
      --bg:#f7f7fb;
      --card:#ffffff;
      --ink:#172033;
      --muted:#59647a;
      --line:#dbe2ef;
      --primary:#4f46e5;
      --primary-dark:#3730a3;
      --primary-soft:#e8e7ff;
      --green:#0f8a5f;
      --green-soft:#e7f7ef;
      --orange:#b45309;
      --orange-soft:#fff4df;
      --red:#b91c1c;
      --red-soft:#fde8e8;
      --blue-soft:#eaf2ff;
      --shadow:0 16px 40px rgba(31,41,55,.10);
      --radius:24px;
      --radius-sm:16px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    *{box-sizing:border-box;}
    html{scroll-behavior:smooth;}
    body{
      margin:0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(79,70,229,.16), transparent 34rem),
        linear-gradient(180deg, #fbfcff 0%, var(--bg) 60%, #eef2ff 100%);
      color:var(--ink);
      line-height:1.5;
      min-height:100vh;
    }

    .app-shell{
      width:min(1180px, 100%);
      margin:0 auto;
      padding:18px clamp(14px, 3vw, 30px) calc(32px + var(--safe-bottom));
    }

    header.app-header{
      position:sticky;
      top:0;
      z-index:20;
      margin:-18px calc(-1 * clamp(14px, 3vw, 30px)) 18px;
      padding:14px clamp(14px, 3vw, 30px);
      background:rgba(247,247,251,.88);
      backdrop-filter: blur(16px);
      border-bottom:1px solid rgba(219,226,239,.85);
    }

    .header-row{
      width:min(1180px, 100%);
      margin:0 auto;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
    }
    .brand{display:flex; align-items:center; gap:12px; min-width:0;}
    .logo{
      width:46px;height:46px;border-radius:16px;
      display:grid;place-items:center;
      background:linear-gradient(135deg,#4f46e5,#7c3aed);
      color:#fff;font-weight:900;font-size:1.3rem;
      box-shadow:0 10px 24px rgba(79,70,229,.25);
      flex:0 0 auto;
    }
    .brand-text{min-width:0;}
    .brand-text h1{font-size:clamp(1.05rem, 2vw, 1.35rem);margin:0;line-height:1.1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .brand-text p{margin:2px 0 0;color:var(--muted);font-size:.9rem;}

    .header-actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:flex-end;}
    .quiet-pill{
      display:inline-flex;align-items:center;gap:7px;
      min-height:36px;padding:7px 10px;border-radius:999px;
      background:#fff;border:1px solid var(--line);color:var(--muted);
      font-size:.9rem;font-weight:650;
      box-shadow:0 6px 16px rgba(31,41,55,.06);
    }

    .screen{display:none; animation:fadeIn .22s ease both;}
    .screen.active{display:block;}
    @keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}

    .hero{
      border-radius:32px;
      padding:clamp(22px, 5vw, 46px);
      background:
        linear-gradient(135deg, rgba(79,70,229,.94), rgba(124,58,237,.92)),
        radial-gradient(circle at 86% 20%, rgba(255,255,255,.28), transparent 14rem);
      color:#fff;
      box-shadow:var(--shadow);
      overflow:hidden;
      position:relative;
    }
    .hero:after{
      content:"";position:absolute;right:-50px;bottom:-70px;width:260px;height:260px;border-radius:50%;
      background:rgba(255,255,255,.10);
    }
    .hero h2{font-size:clamp(2rem, 5vw, 4.1rem);line-height:1.02;margin:0 0 12px;max-width:880px;}
    .hero p{font-size:clamp(1.05rem,2vw,1.25rem);max-width:820px;margin:0 0 20px;color:rgba(255,255,255,.92);}

    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--radius);
      padding:clamp(18px, 3vw, 28px);
      box-shadow:var(--shadow);
      margin:18px 0;
    }
    .card.compact{padding:16px;box-shadow:0 8px 22px rgba(31,41,55,.07);border-radius:18px;}
    .subtle-card{background:#fff;border:1px solid var(--line);border-radius:18px;padding:16px;}
    .soft-blue{background:var(--blue-soft);border-color:#bfdbfe;}
    .soft-green{background:var(--green-soft);border-color:#a7f3d0;}
    .soft-orange{background:var(--orange-soft);border-color:#fed7aa;}
    .soft-red{background:var(--red-soft);border-color:#fecaca;}
    .soft-primary{background:var(--primary-soft);border-color:#c7d2fe;}

    h2{font-size:clamp(1.55rem,3vw,2.25rem);line-height:1.1;margin:0 0 14px;}
    h3{font-size:clamp(1.22rem,2vw,1.55rem);line-height:1.2;margin:0 0 12px;}
    h4{font-size:1.05rem;margin:0 0 8px;}
    p{margin:0 0 10px;}
    .muted{color:var(--muted);}
    .small{font-size:.92rem;}
    .lead{font-size:1.08rem;color:#334155;}
    .section-label{font-weight:850;color:var(--primary-dark);letter-spacing:.02em;text-transform:uppercase;font-size:.78rem;margin:0 0 8px;}

    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:14px;}
    .grid.two{grid-template-columns:repeat(auto-fit,minmax(300px,1fr));}
    .grid.three{grid-template-columns:repeat(auto-fit,minmax(220px,1fr));}

    button,.btn{
      appearance:none;border:0;border-radius:16px;
      min-height:52px;padding:12px 18px;
      background:var(--primary);color:#fff;font-weight:800;font-size:1rem;
      cursor:pointer;box-shadow:0 10px 22px rgba(79,70,229,.22);
      display:inline-flex;align-items:center;justify-content:center;gap:8px;text-decoration:none;
      touch-action:manipulation;
    }
    button:hover,.btn:hover{background:var(--primary-dark);}
    button.secondary{background:#fff;color:var(--ink);border:1px solid var(--line);box-shadow:0 8px 18px rgba(31,41,55,.07);}
    button.ghost{background:transparent;color:var(--primary-dark);border:1px solid #c7d2fe;box-shadow:none;}
    button.success{background:var(--green);}
    button.warning{background:var(--orange);}
    button.danger{background:var(--red);}
    button:disabled{opacity:.45;cursor:not-allowed;box-shadow:none;}
    .button-row{display:flex;flex-wrap:wrap;gap:10px;margin-top:16px;align-items:center;}
    .nav-footer{display:flex;flex-wrap:wrap;gap:10px;justify-content:space-between;align-items:center;margin:18px 0 0;}
    .nav-footer .secondary{min-width:190px;}
    .lock-button{font-size:1.08rem;min-width:48px;padding-inline:14px;}
    .full{width:100%;}

    input, select, textarea{
      width:100%;min-height:50px;border:1px solid var(--line);border-radius:14px;
      padding:11px 12px;font:inherit;background:#fff;color:var(--ink);
    }
    textarea{min-height:110px;resize:vertical;}
    label{font-weight:750;display:block;margin:0 0 7px;}
    .name-input{margin-top:10px;}
    .role-card{
      border:1px solid var(--line);border-radius:20px;background:#fff;padding:16px;min-height:210px;
      display:flex;flex-direction:column;justify-content:space-between;
    }
    .role-icon{font-size:2rem;line-height:1;margin-bottom:8px;}
    .role-card h3{font-size:1.16rem;margin-bottom:8px;}
    .role-card p{color:var(--muted);font-size:.96rem;}
    .role-card.done{border-color:#86efac;background:#f0fdf4;}

    .progress-line{height:9px;background:#e5e7eb;border-radius:999px;overflow:hidden;margin:12px 0 0;}
    .progress-line > div{height:100%;width:0;background:linear-gradient(90deg,var(--primary),#7c3aed);border-radius:inherit;transition:width .25s ease;}

    .top-status{
      display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;
      padding:12px 14px;background:#fff;border:1px solid var(--line);border-radius:20px;margin:12px 0;
      box-shadow:0 8px 18px rgba(31,41,55,.05);
    }
    .timer{
      font-variant-numeric:tabular-nums;font-size:1.2rem;font-weight:950;
      display:inline-flex;align-items:center;gap:8px;padding:8px 12px;border-radius:999px;background:var(--primary-soft);color:var(--primary-dark);
    }
    .teacher-badge{display:none;align-items:center;gap:7px;background:var(--orange-soft);color:#7c2d12;border:1px solid #fdba74;border-radius:999px;padding:7px 10px;font-weight:850;}
    .teacher-badge.visible{display:inline-flex;}

    .station-overview{
      margin-top:12px;
      padding:10px;
      border:1px solid rgba(255,255,255,.22);
      border-radius:20px;
      background:rgba(255,255,255,.72);
      backdrop-filter:blur(10px);
      box-shadow:0 8px 18px rgba(31,41,55,.06);
      overflow-x:auto;
      -webkit-overflow-scrolling:touch;
    }
    .station-overview-inner{
      display:flex;
      align-items:center;
      gap:8px;
      min-width:max-content;
    }
    .station-overview-label{
      font-size:.82rem;
      font-weight:900;
      color:var(--muted);
      padding:0 6px 0 2px;
      white-space:nowrap;
    }
    .station-nav-btn{
      min-height:42px;
      padding:8px 12px;
      border-radius:999px;
      font-size:.9rem;
      box-shadow:none;
      background:#fff;
      color:var(--ink);
      border:1px solid var(--line);
      white-space:nowrap;
    }
    .station-nav-btn:hover{background:var(--primary-soft);color:var(--primary-dark);}
    .station-nav-btn.active{
      background:var(--primary);
      color:#fff;
      border-color:var(--primary);
      box-shadow:0 8px 18px rgba(79,70,229,.18);
    }

    .fraction-task{
      display:flex;align-items:center;justify-content:center;gap:22px;flex-wrap:wrap;
      font-size:1.6rem;font-weight:800;padding:16px;border-radius:22px;background:#f8fafc;border:1px solid var(--line);
      margin:12px 0;
    }
    .frac{display:inline-grid;grid-template-rows:auto auto;place-items:center;vertical-align:middle;line-height:1;min-width:1.15em;font-weight:850;}
    .frac .top{border-bottom:2px solid currentColor;width:100%;text-align:center;padding:0 .1em .12em;}
    .frac .bottom{text-align:center;padding:.12em .1em 0;}
    .mathline{font-size:1.24rem;font-weight:800;display:block;margin:8px 0;}

    .strip-tool{border:1px solid var(--line);border-radius:22px;padding:16px;background:#fff;margin:14px 0;}
    .strip-title{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:12px;}
    .strip-box{
      width:min(100%, 12cm);
      min-width:0;
      height:56px;
      border:2px solid #111827;
      margin:12px auto 6px;
      display:grid;
      overflow:hidden;
      background:#fff;
      border-radius:8px;
      position:relative;
    }
    .seg{border-right:1px solid rgba(17,24,39,.62);display:flex;align-items:center;justify-content:center;font-size:.88rem;color:#111827;min-width:0;}
    .seg:last-child{border-right:0;}
    .seg.marked{background:linear-gradient(180deg,#bfdbfe,#93c5fd);}
    .strip-ruler{width:min(100%, 12cm);margin:0 auto;color:var(--muted);font-size:.9rem;display:flex;justify-content:space-between;}
    .controls{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px;margin-top:12px;align-items:end;}
    input[type="range"]{padding:0;min-height:34px;accent-color:var(--primary);}
    .range-value{font-weight:900;color:var(--primary-dark);}
    .formula-check{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;margin-top:12px;}
    .feedback{border-radius:14px;padding:10px 12px;margin-top:8px;font-weight:700;display:none;}
    .feedback.show{display:block;}
    .feedback.ok{background:var(--green-soft);color:#065f46;border:1px solid #a7f3d0;}
    .feedback.no{background:var(--red-soft);color:#7f1d1d;border:1px solid #fecaca;}

    .hint-area{display:grid;gap:12px;}
    .hint-card{border:1px solid var(--line);border-radius:18px;background:#fff;padding:14px;box-shadow:0 6px 16px rgba(31,41,55,.05);}
    .hint-card.locked{opacity:.56;background:#f8fafc;}
    .hint-card.revealed{border-color:#a7f3d0;background:#f0fdf4;}
    .hint-body{display:none;margin-top:10px;color:#1f2937;}
    .hint-card.revealed .hint-body{display:block;}

    .strategy-tip{display:grid;gap:12px;}
    .strategy-tip h3{margin:6px 0 2px;color:var(--primary-dark);}
    .visual-rule{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;align-items:stretch;}
    .rule-box{border:1px solid var(--line);border-radius:16px;background:#fff;padding:12px;display:grid;gap:8px;}
    .rule-box strong{color:var(--primary-dark);}
    .rule-arrow{display:flex;align-items:center;justify-content:center;font-weight:900;color:var(--primary-dark);font-size:1.1rem;}
    .mini-parts{display:grid;gap:4px;}
    .mini-strip{height:26px;border:1px solid #94a3b8;border-radius:10px;overflow:hidden;display:grid;background:#fff;}
    .mini-strip.four{grid-template-columns:repeat(4,1fr);} 
    .mini-strip.three{grid-template-columns:repeat(3,1fr);} 
    .mini-strip.twelve{grid-template-columns:repeat(12,1fr);} 
    .mini-strip span{border-right:1px solid #cbd5e1;background:#f8fafc;}
    .mini-strip span:last-child{border-right:0;}
    .mini-strip .mark{background:#bfdbfe;}
    .sentence-inline{border-left:5px solid var(--primary);background:var(--primary-soft);padding:10px 12px;border-radius:14px;font-weight:800;}
    .hint-card.waiting{opacity:.62;background:#f8fafc;}
    .hint-card.waiting .hint-body{display:none;}


    .check-list{display:grid;gap:10px;margin:12px 0;}
    .check-item{
      display:flex;align-items:flex-start;gap:12px;padding:12px;border:1px solid var(--line);border-radius:16px;background:#fff;
      cursor:pointer;min-height:52px;
    }
    .check-item input{width:22px;min-height:22px;margin-top:2px;accent-color:var(--primary);flex:0 0 auto;}
    .check-item strong{display:block;}

    .option-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:10px;margin:12px 0;}
    .option-card{padding:14px;border:1px solid var(--line);border-radius:16px;background:#fff;cursor:pointer;font-weight:800;min-height:54px;display:flex;align-items:center;justify-content:center;text-align:center;}
    .option-card.selected{border-color:var(--primary);background:var(--
